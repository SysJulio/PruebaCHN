services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chn-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ChnPass123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ChnPass123! -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chn-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database/schema.sql:/schema.sql:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P ChnPass123! -C -i /schema.sql"

  backend:
    build: ./backend
    container_name: chn-backend
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=chn_prestamos;encrypt=true;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "ChnPass123!"
    ports:
      - "8081:8080"

  frontend:
    build: ./frontend
    container_name: chn-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  sqlserver-data:
